services:
  mysql:
    image: mysql:8.0
    container_name: recipe-mysql
    environment:
      MYSQL_DATABASE: recipedb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3069:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: 